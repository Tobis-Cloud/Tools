<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tobi - Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/jpeg" href="Tools.jpeg">

    <link rel="apple-touch-icon" href="Tools.jpeg">
    <link rel="apple-touch-icon" sizes="152x152" href="Tools.jpeg">
    <link rel="apple-touch-icon" sizes="180x180" href="Tools.jpeg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Tobi Tools">

    <style>
        /* CSS VARIABLEN FÜR EINFACHE ANPASSUNGEN */
        :root {
            --bg-color: #000000;          /* Reines, edles Schwarz */
            --text-color: #ffffff;
            
            /* Farbschema für Verläufe: Lila -> Pink -> Rot */
            --color-purple: #a855f7;     /* Lila */
            --color-pink: #ec4899;       /* Pink */
            --color-red: #ef4444;        /* Rot */
        }

        /* STRUKTUR & BACKDROP */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent; /* Verhindert blauen Kasten beim Tippen auf Handys */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* HINTERGRUND-CONTAINER FÜR ANIMIERTE BLOBS */
        .glow-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000000;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            width: 450px;
            height: 450px;
            border-radius: 50%;
            mix-blend-mode: screen;
            filter: blur(100px);
            opacity: 0.22;
            pointer-events: none;
        }

        .blob-purple {
            background-color: var(--color-purple);
            top: -10%;
            left: -10%;
            animation: move-purple 15s infinite alternate ease-in-out;
        }

        .blob-pink {
            background-color: var(--color-pink);
            bottom: -10%;
            right: -10%;
            animation: move-pink 12s infinite alternate ease-in-out;
        }

        .blob-red {
            background-color: var(--color-red);
            top: 35%;
            left: 20%;
            animation: move-red 18s infinite alternate ease-in-out;
        }

        @keyframes move-purple {
            0% { transform: translate3d(0, 0, 0) scale(1); }
            50% { transform: translate3d(120px, 80px, 0) scale(1.2); }
            100% { transform: translate3d(-60px, 150px, 0) scale(0.95); }
        }

        @keyframes move-pink {
            0% { transform: translate3d(0, 0, 0) scale(0.9); }
            50% { transform: translate3d(-150px, -90px, 0) scale(1.25); }
            100% { transform: translate3d(80px, 60px, 0) scale(1.1); }
        }

        @keyframes move-red {
            0% { transform: translate3d(0, 0, 0) scale(1.1); }
            50% { transform: translate3d(-80px, 120px, 0) scale(0.85); }
            100% { transform: translate3d(90px, -100px, 0) scale(1.2); }
        }

        /* CONTAINER FÜR MOBILE OPTIMIERUNG */
        .container {
            width: 100%;
            max-width: 400px;
            z-index: 2;
            position: relative;
            display: none; /* Standardmäßig ausgeblendet, bis Passwort korrekt ist */
            flex-direction: column;
            align-items: center;
        }

        /* HEADER / ÜBERSCHRIFT */
        header {
            margin-bottom: 40px;
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--color-purple), var(--color-pink), var(--color-red));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(236, 72, 153, 0.2);
        }

        .subtitle {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        /* BUTTON LISTE & ABSTÄNDE */
        .button-list {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* BUTTON STYLING */
        .tool-btn {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 16px;
            width: 100%;
            padding: 12px 16px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            background: rgba(20, 18, 25, 0.8);
            border: 1px solid transparent;
            background-clip: padding-box;
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), 
                        box-shadow 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            object-fit: cover;
            background-color: rgba(255, 255, 255, 0.1);
        }

        .tool-btn::before {
            content: '';
            position: absolute;
            top: -1px; left: -1px; right: -1px; bottom: -1px;
            z-index: -1;
            border-radius: 12px;
            background: linear-gradient(135deg, var(--color-purple), var(--color-pink), var(--color-red));
            opacity: 0.4;
            transition: opacity 0.2s ease;
        }

        .tool-btn:hover::before,
        .tool-btn:active::before {
            opacity: 1;
        }

        .tool-btn:hover,
        .tool-btn:active {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.15);
            background: rgba(30, 27, 38, 0.9);
        }

        /* PASSWORT FORMULAR STYLING */
        .login-box {
            position: relative;
            z-index: 3;
            background: rgba(20, 18, 25, 0.8);
            padding: 30px 20px;
            border-radius: 16px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-top: 15vh;
        }

        .login-box h2 {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--color-purple), var(--color-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .login-box p {
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
        }

        .login-box input {
            width: 100%;
            padding: 14px;
            margin-bottom: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(0, 0, 0, 0.6);
            color: #fff;
            font-size: 1rem;
            text-align: center;
            outline: none;
            font-family: 'Outfit', sans-serif;
            transition: border-color 0.2s;
        }

        .login-box input:focus {
            border-color: var(--color-pink);
        }

        .login-box button {
            background: linear-gradient(135deg, var(--color-purple), var(--color-pink), var(--color-red));
            color: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            transition: transform 0.1s;
        }

        .login-box button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="glow-bg">
        <div class="blob blob-purple"></div>
        <div class="blob blob-pink"></div>
        <div class="blob blob-red"></div>
    </div>

    <div id="loginBox" class="login-box">
        <h2>Geschützter Bereich</h2>
        <p>Bitte gib das Passwort ein, um fortzufahren.</p>
        <input type="password" id="passwordInput" placeholder="Passwort">
        <button onclick="checkPassword()">Freischalten</button>
    </div>

    <div id="mainContainer" class="container">
        
        <header>
            <h1>Tobi - Tools</h1>
            <div class="subtitle">Übersicht</div>
        </header>

        <main class="button-list">
            <a href="https://tobis-cloud.github.io/binokel/" class="tool-btn">
                <img src="Binokel.jpeg" alt="Binokel" class="btn-icon">
                <span>Binokel</span>
            </a>
            <a href="https://tobis-cloud.github.io/training/" class="tool-btn">
                <img src="Training.jpeg" alt="Training" class="btn-icon">
                <span>Training</span>
            </a>
            <a href="https://tobis-cloud.github.io/StilleZeit/" class="tool-btn">
                <img src="Stille.jpeg" alt="Stille Zeit" class="btn-icon">
                <span>Stille Zeit</span>
            </a>
            <a href="https://tobis-cloud.github.io/Top10/" class="tool-btn">
                <img src="Top10.jpeg" alt="Top 10" class="btn-icon">
                <span>Top 10</span>
            </a>
            <a href="https://tobis-cloud.github.io/kniffel/" class="tool-btn">
                <img src="Kniffel.jpeg" alt="Kniffel" class="btn-icon">
                <span>Kniffel</span>
            </a>
            <a href="https://tobis-cloud.github.io/GluecksRad/" class="tool-btn">
                <img src="Rad.jpeg" alt="Glücksrad" class="btn-icon">
                <span>Glücksrad</span>
            </a>
            <a href="https://tobis-cloud.github.io/AufDeinWort/" class="tool-btn">
                <img src="AufDeinWort.jpeg" alt="Auf dein Wort" class="btn-icon">
                <span>Auf dein Wort</span>
            </a>
            <a href="https://tobis-cloud.github.io/Gewicht1/" class="tool-btn">
                <img src="Gewicht.jpeg" alt="Gewicht" class="btn-icon">
                <span>Gewichtstracker</span>
            </a>
        </main>

    </div>

    <script>
        function checkPassword() {
            var password = document.getElementById("passwordInput").value;
            
            // Hier dein gewünschtes Passwort eintragen
            if (password === "Jesus") { 
                document.getElementById("loginBox").style.display = "none";
                document.getElementById("mainContainer").style.display = "flex";
            } else {
                alert("Falsches Passwort!");
            }
        }

        // Aktiviert den Button auch bei Drücken der Enter-Taste
        document.getElementById("passwordInput").addEventListener("keypress", function(event) {
            if (event.key === "Enter") {
                checkPassword();
            }
        });
    </script>

</body>
</html>
